<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K ❤️ V</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --pink-soft: #ffe6f2;
    --pink-medium: #ff6b9d;
    --pink-deep: #ff2e7a;
    --lavender: #e6cfff;
    --lavender-light: #f3eaff;
    --lavender-dark: #c9a8ff;
    --beige: #fff8f0;
    --warm-white: #fffaf5;
    --gold: #ffd700;
    --gold-light: #fff9c4;
    --text-dark: #5a3d5c;
    --text-light: #8a6d8b;
    --shadow-soft: rgba(255, 107, 157, 0.2);
    --shadow-medium: rgba(255, 107, 157, 0.4);
    --shadow-deep: rgba(255, 107, 157, 0.6);
}

[data-theme="night"] {
    --pink-soft: #1a0f1a;
    --pink-medium: #4a2c4a;
    --pink-deep: #8a4a8a;
    --lavender: #2d1b4a;
    --lavender-light: #3a2a5a;
    --lavender-dark: #1e1335;
    --beige: #1a1512;
    --warm-white: #0f0f0f;
    --gold: #c9a52c;
    --gold-light: #2a2520;
    --text-dark: #e8d4ff;
    --text-light: #b8a4c8;
    --shadow-soft: rgba(138, 74, 138, 0.2);
    --shadow-medium: rgba(138, 74, 138, 0.4);
    --shadow-deep: rgba(138, 74, 138, 0.6);
}

/* =====================
   ANIMATED BACKGROUND
   ===================== */

body {
    font-family: 'Poppins', sans-serif;
    color: var(--text-dark);
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
}

/* Canvas aurora layer */
#aurora-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    pointer-events: none;
}

/* Soft petal particles */
#petal-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    pointer-events: none;
}

/* Fallback gradient (renders instantly before JS kicks in) */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse at 20% 20%, rgba(255,182,214,0.55) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(200,160,255,0.45) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 80%, rgba(255,230,242,0.6) 0%, transparent 65%),
        radial-gradient(ellipse at 10% 70%, rgba(230,207,255,0.4) 0%, transparent 50%),
        linear-gradient(160deg, #fff0f8 0%, #f3eaff 40%, #ffe6f2 70%, #fff8f0 100%);
    z-index: -3;
}

[data-theme="night"] body::before {
    background:
        radial-gradient(ellipse at 20% 20%, rgba(80,30,90,0.6) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(45,27,74,0.6) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 80%, rgba(26,15,26,0.8) 0%, transparent 65%),
        linear-gradient(160deg, #0f0a14 0%, #1a0f1a 40%, #14101e 70%, #0f0a14 100%);
}

html {
    scroll-behavior: smooth;
}

/* =====================
   OPENING ANIMATION
   ===================== */

.opening-animation {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    background: linear-gradient(135deg, #fff0f8 0%, #f3eaff 50%, #fff8f0 100%);
}

.opening-animation.entering {
    opacity: 0;
    visibility: visible;
    animation: openingFadeIn 0.6s ease forwards;
}

.opening-animation.visible {
    opacity: 1;
    visibility: visible;
}

.opening-animation.exiting {
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.6s ease, visibility 0.6s ease;
}

@keyframes openingFadeIn {
    from { opacity: 0; transform: scale(1.03); }
    to   { opacity: 1; transform: scale(1); }
}

.opening-content {
    text-align: center;
    animation: openingScale 0.9s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes openingScale {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}

.opening-heart {
    font-size: 5rem;
    animation: heartbeat 1.4s ease-in-out infinite;
    margin-bottom: 1rem;
    display: block;
    filter: drop-shadow(0 0 20px rgba(255,46,122,0.5));
}

.opening-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #5a3d5c;
    margin-bottom: 0.5rem;
    animation: fadeInUp 1s ease-out 0.3s both;
    text-shadow: 0 2px 20px rgba(255,107,157,0.3);
}

.opening-subtitle {
    font-size: 3rem;
    animation: fadeInUp 1s ease-out 0.6s both;
}

/* =====================
   KEYFRAMES
   ===================== */

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.65; }
    25%  { transform: translateY(-14px) rotate(-4deg); opacity: 0.85; }
    50%  { transform: translateY(-26px) rotate(0deg);  opacity: 1; }
    75%  { transform: translateY(-14px) rotate(4deg);  opacity: 0.85; }
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    20%  { transform: scale(1.15); }
    40%  { transform: scale(1); }
    60%  { transform: scale(1.08); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.04); }
    to   { opacity: 1; transform: scale(1); }
}

@keyframes scaleIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
}

@keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50%  { opacity: 1; transform: scale(1) rotate(180deg); }
}

@keyframes glow {
    0%, 100% { box-shadow: 0 0 30px var(--shadow-soft), 0 0 60px var(--shadow-medium); }
    50%  { box-shadow: 0 0 50px var(--shadow-medium), 0 0 90px var(--shadow-deep); }
}

@keyframes gentlePulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.018); opacity: 0.92; }
}

@keyframes rotatePhoto {
    0%   { transform: rotateY(0deg)  scale(1);   opacity: 1; }
    50%  { transform: rotateY(90deg) scale(0.88); opacity: 0.4; }
    100% { transform: rotateY(0deg)  scale(1);   opacity: 1; }
}

@keyframes timelinePulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--shadow-medium); }
    50%  { opacity: 0.75; box-shadow: 0 0 24px var(--shadow-deep); }
}

@keyframes rotate3DDisc {
    from { transform: rotateY(0deg); }
    to   { transform: rotateY(360deg); }
}

@keyframes pulse {
    0%   { transform: scale(1);   box-shadow: 0 0 0 0 rgba(255,105,180,0.7); }
    50%  { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255,105,180,0); }
    100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(255,105,180,0); }
}

@keyframes pulse-glow {
    0%, 100% { box-shadow: 0 10px 30px rgba(255,107,139,0.35); }
    50%  { box-shadow: 0 14px 48px rgba(255,107,139,0.6); }
}

@keyframes pulse-glow-night {
    0%, 100% { box-shadow: 0 15px 40px rgba(138,61,138,0.4); }
    50%  { box-shadow: 0 15px 56px rgba(138,61,138,0.7); }
}

@keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
}

@keyframes loveLetterDrop {
    0%   { opacity: 0; transform: translateY(-60px) scale(0.8) rotate(-3deg); }
    60%  { transform: translateY(8px)  scale(1.02) rotate(1deg); }
    80%  { transform: translateY(-4px) scale(0.99) rotate(-0.5deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}

@keyframes revealLetter {
    from { opacity: 0; transform: scale(0.85) translateY(24px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
}

@keyframes heartRain {
    0%   { transform: translateY(-10px) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* =====================
   SPARKLE DOTS
   ===================== */

.sparkle {
    position: absolute;
    width: 8px; height: 8px;
    background: linear-gradient(45deg, var(--gold), var(--pink-deep));
    border-radius: 50%;
    animation: sparkle 2.5s ease-in-out infinite;
    z-index: 1;
    pointer-events: none;
}

.floating-heart {
    position: absolute;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    animation: float 4s ease-in-out infinite;
    opacity: 0.65;
    filter: drop-shadow(0 4px 8px var(--shadow-soft));
    z-index: 1;
    pointer-events: none;
    transition: all 0.3s ease;
}
.floating-heart:hover { opacity: 1; transform: scale(1.2); }
.floating-heart:nth-child(1)  { left:  5%; top: 10%; animation-delay: 0s; }
.floating-heart:nth-child(2)  { left: 85%; top: 15%; animation-delay: 1.2s; }
.floating-heart:nth-child(3)  { left: 15%; top: 70%; animation-delay: 2.4s; }
.floating-heart:nth-child(4)  { right:10%; top: 65%; animation-delay: 1.8s; }
.floating-heart:nth-child(5)  { left: 55%; top:  5%; animation-delay: 0.6s; }
.floating-heart:nth-child(6)  { left: 75%; top: 80%; animation-delay: 3s; }
.floating-heart:nth-child(7)  { left: 25%; top: 25%; animation-delay: 1.5s; }
.floating-heart:nth-child(8)  { left: 65%; top: 35%; animation-delay: 2.1s; }

/* =====================
   HERO
   ===================== */

.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 2rem;
    text-align: center;
}

.hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 2.5rem;
    animation: gentlePulse 4s ease-in-out infinite;
    z-index: 2;
    position: relative;
    text-shadow: 2px 2px 8px var(--shadow-soft), 0 0 30px var(--shadow-medium);
    letter-spacing: 0.5px;
    padding: 0 1rem;
}

.photo-carousel {
    position: relative;
    width: clamp(250px, 70vw, 350px);
    height: clamp(250px, 70vw, 350px);
    margin: 2rem auto;
    z-index: 2;
}

.photo-container {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    animation: glow 3s ease-in-out infinite, gentlePulse 6s ease-in-out infinite;
    border: 10px solid rgba(255,255,255,0.92);
    box-shadow: 0 0 50px var(--shadow-soft), 0 0 90px var(--shadow-medium),
                inset 0 0 30px rgba(255,255,255,0.3);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    cursor: pointer;
}

.photo-container:hover {
    transform: scale(1.06) rotate(4deg);
    box-shadow: 0 0 70px var(--shadow-medium), 0 0 120px var(--shadow-deep),
                inset 0 0 40px rgba(255,255,255,0.5);
}

.photo-container.rotating {
    animation: rotatePhoto 0.8s ease-in-out, glow 3s ease-in-out infinite;
}

.photo-container img {
    width: 100%; height: 100%;
    object-fit: cover;
    animation: fadeIn 0.8s ease-in-out;
}

.carousel-controls {
    position: absolute;
    bottom: -50px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1rem;
    z-index: 3;
}

.carousel-btn {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: none;
    background: var(--pink-medium);
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0.6;
}
.carousel-btn.active { background: var(--pink-deep); opacity: 1; transform: scale(1.3); }
.carousel-btn:hover  { opacity: 1; transform: scale(1.3); }

/* =====================
   SECTIONS
   ===================== */

.section {
    padding: 5rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
}

.section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    text-align: center;
    margin-bottom: 3rem;
    color: var(--text-dark);
    position: relative;
    padding-bottom: 1rem;
    animation: fadeInUp 0.8s ease-out both;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 3px;
    background: linear-gradient(to right, transparent, var(--pink-deep), transparent);
    border-radius: 2px;
}

/* =====================
   GALLERY
   ===================== */

.gallery-3d-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100px;
    padding: 0.5rem;
    position: relative;
    perspective: 1200px;
    perspective-origin: center center;
}

.gallery-3d-disc {
    position: relative;
    width: 400px; height: 400px;
    margin: 0 auto;
    transform-style: preserve-3d;
    animation: rotate3DDisc 70s linear infinite;
}

.gallery-3d-item {
    position: absolute;
    width: 160px; height: 160px;
    top: 50%; left: 50%;
    transform-style: preserve-3d;
    transform-origin: center center;
    transform: translate(-50%, -50%) rotateY(var(--angle)) translateZ(600px);
}

.gallery-item {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    border: 4px solid rgba(255,255,255,0.92);
}

.gallery-item:hover {
    transform: scale(1.15) translateZ(30px);
    z-index: 10;
    box-shadow: 0 25px 50px rgba(0,0,0,0.45);
    border-color: var(--pink-deep);
}

.gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: filter 0.3s ease;
    display: block;
}

.gallery-item:hover img { filter: brightness(1.15); }

.gallery-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
    color: white;
    padding: 0.3rem 0.3rem 0.3rem;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    font-size: 0.7rem;
    text-align: center;
    font-weight: 500;
    border-radius: 0 0 16px 16px;
}

.gallery-item:hover .gallery-caption { transform: translateY(0); }

/* =====================
   TIMELINE
   ===================== */

.dates-timeline {
    position: relative;
    padding: 3rem 0;
}

.timeline-line {
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom,
        transparent 0%,
        var(--pink-soft) 5%,
        var(--pink-medium) 50%,
        var(--pink-deep) 70%,
        var(--pink-soft) 95%,
        transparent 100%);
    transform: translateX(-50%);
    border-radius: 2px;
    animation: timelinePulse 3s ease-in-out infinite;
}

.timeline-item {
    position: relative;
    margin: 4rem 0;
    display: flex;
    align-items: center;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.65s cubic-bezier(0.34,1.2,0.64,1);
    min-height: 120px;
}

.timeline-item.visible { opacity: 1; transform: translateY(0); }
.timeline-item:nth-child(odd)  { flex-direction: row; }
.timeline-item:nth-child(even) { flex-direction: row-reverse; }

.timeline-content {
    background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,248,240,0.92) 100%);
    backdrop-filter: blur(18px);
    border-radius: 25px;
    padding: 2.5rem;
    width: 45%;
    box-shadow: 0 15px 40px var(--shadow-soft), 0 5px 20px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.65);
    transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    position: relative;
    overflow: hidden;
}

.timeline-content::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--pink-soft), var(--pink-deep), var(--pink-soft));
    border-radius: 25px 25px 0 0;
}

.timeline-content:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 28px 65px var(--shadow-medium), 0 10px 30px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.9);
}

.timeline-dot {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    width: 26px; height: 26px;
    background: radial-gradient(circle at 30% 30%, var(--pink-deep), var(--pink-medium));
    border-radius: 50%;
    border: 5px solid var(--warm-white);
    box-shadow: 0 0 30px var(--shadow-medium), 0 0 55px var(--shadow-deep),
                inset 0 0 15px rgba(255,255,255,0.3);
    z-index: 2;
    transition: all 0.3s ease;
    cursor: pointer;
}

.timeline-dot:hover {
    transform: translateX(-50%) scale(1.35);
}

.timeline-dot::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    background: var(--warm-white);
    border-radius: 50%;
}

.timeline-date {
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    color: var(--pink-deep);
    margin-bottom: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.8rem;
}

.timeline-date-icon {
    font-size: 1.8rem;
    animation: heartbeat 1.5s ease-in-out infinite;
}

.timeline-type {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 1.9rem);
    color: var(--text-dark);
    margin-bottom: 1rem;
    font-weight: 700;
    position: relative;
    padding-bottom: 0.5rem;
}

.timeline-type::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--pink-deep), transparent);
    border-radius: 2px;
}

.timeline-title {
    font-size: clamp(1rem, 2vw, 1.3rem);
    color: var(--text-dark);
    line-height: 1.6;
    font-weight: 500;
    padding: 0.5rem 0 0.5rem 1rem;
    border-left: 3px solid var(--pink-medium);
}

.timeline-content:hover .timeline-title {
    border-left-color: var(--pink-deep);
    padding-left: 1.5rem;
    transition: all 0.3s ease;
}

/* =====================
   LOVE NOTES
   ===================== */

.love-notes {
    display: flex;
    flex-direction: column;
    gap: 1.6rem;
    margin-top: 3rem;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
}

.note-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,248,240,0.95) 100%);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 2.5rem 2rem 2rem;
    box-shadow: 0 20px 50px var(--shadow-soft), 0 5px 20px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.65);
    position: relative;
    transition: all 0.45s cubic-bezier(0.175,0.885,0.32,1.275);
    opacity: 0;
    animation: fadeInUp 0.8s ease-out forwards;
    overflow: hidden;
}

.note-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--pink-soft), var(--pink-deep), var(--pink-soft));
    border-radius: 25px 25px 0 0;
}

.note-card::after {
    content: '💕';
    position: absolute;
    top: -15px; left: 50%;
    transform: translateX(-50%);
    font-size: 2rem;
    background: var(--warm-white);
    padding: 0.5rem;
    border-radius: 50%;
    box-shadow: 0 5px 15px var(--shadow-soft);
}

.note-card:nth-child(1) { animation-delay: 0.1s; }
.note-card:nth-child(2) { animation-delay: 0.2s; }
.note-card:nth-child(3) { animation-delay: 0.3s; }

.note-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 32px 72px var(--shadow-medium), 0 10px 30px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.9);
}

.note-heart {
    position: absolute;
    top: 1rem; right: 1rem;
    font-size: 2rem;
    color: var(--pink-deep);
}

.note-card:hover .note-heart {
    animation: heartbeat 1s ease-in-out infinite, float 3s ease-in-out infinite;
    transform: scale(1.2) rotate(10deg);
}

.typewriter-text {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(1.2rem, 2vw, 1.5rem);
    line-height: 1.8;
    color: var(--text-dark);
    min-height: 60px;
    text-align: center;
    font-style: italic;
    padding: 0 1rem;
}

.typewriter-cursor {
    display: inline-block;
    width: 2px; height: 1.2rem;
    background: var(--pink-deep);
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
}

@keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
}

/* =====================
   QUOTES
   ===================== */

.quotes-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    margin-top: 3rem;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
    padding: 0 1rem;
}

.quote-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,248,240,0.92) 100%);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 50px var(--shadow-soft), 0 5px 20px rgba(0,0,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.65);
    position: relative;
    transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 0.8s ease-out forwards;
    text-align: center;
    overflow: hidden;
}

.quote-card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 30px 70px var(--shadow-medium), 0 10px 30px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.9);
}

.quote-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--pink-soft), var(--pink-deep), var(--pink-soft));
    border-radius: 25px 25px 0 0;
}

.quote-icon {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    animation: float 4s ease-in-out infinite;
    display: inline-block;
}

.quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    line-height: 1.65;
    color: var(--text-dark);
    margin-bottom: 1.5rem;
    font-style: italic;
    padding: 0 1rem;
}

.quote-text::before { content: '\201C'; font-size: 2rem; color: var(--pink-deep); opacity: 0.7; margin-right: 0.3rem; }
.quote-text::after  { content: '\201D'; font-size: 2rem; color: var(--pink-deep); opacity: 0.7; margin-left: 0.3rem; }

.quote-author {
    font-size: 1rem;
    color: var(--text-light);
    font-style: italic;
    opacity: 0.85;
}

/* =====================
   CONTROLS
   ===================== */

.controls {
    position: fixed;
    top: 2rem; right: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    z-index: 1000;
}

.control-btn {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    cursor: pointer;
    font-size: 1.5rem;
    box-shadow: 0 5px 18px var(--shadow-soft);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.control-btn:hover { transform: scale(1.12); box-shadow: 0 8px 24px var(--shadow-medium); }
.control-btn.pulse { animation: pulse 2s infinite; }

/* =====================
   SURPRISE BUTTON
   ===================== */

.surprise-button-container {
    text-align: center;
    margin: 3rem 0 2rem;
    padding: 0 1rem;
}

.surprise-button {
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--pink-medium) 100%);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 1.5rem 3rem;
    font-size: 1.8rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    box-shadow: 0 15px 40px var(--shadow-medium);
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    animation: pulse-glow 2s infinite;
    position: relative;
    overflow: hidden;
}

.surprise-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    z-index: 1;
}

.surprise-button:hover {
    transform: translateY(-8px);
    box-shadow: 0 22px 55px var(--shadow-deep);
}

.surprise-button:active { transform: translateY(-4px); }

.surprise-button-heart {
    font-size: 2.2rem;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
}
.surprise-button-heart:first-child { animation-delay: 0.2s; }
.surprise-button-heart:last-child  { animation-delay: 0.4s; }

.surprise-button-text {
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.5px;
}

.surprise-button-hint {
    color: #ff6b8b;
    font-size: 1rem;
    margin-top: 0.8rem;
    opacity: 0.8;
    font-style: italic;
}

[data-theme="night"] .surprise-button {
    background: linear-gradient(135deg, var(--pink-deep) 0%, var(--lavender-dark) 100%);
    animation-name: pulse-glow-night;
}
[data-theme="night"] .surprise-button:hover {
    background: linear-gradient(135deg, var(--lavender-dark) 0%, var(--pink-deep) 100%);
}
[data-theme="night"] .surprise-button-hint { color: var(--lavender); }

/* =====================
   LOVE LETTER MODAL  (replaces old surprise modal)
   ===================== */

.surprise-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease;
    padding: 1rem;
}

.surprise-modal.active {
    opacity: 1;
    pointer-events: all;
}

/* Falling hearts behind the modal */
.surprise-heart {
    position: absolute;
    font-size: 2rem;
    animation: heartRain linear infinite;
    opacity: 0.7;
    z-index: 1;
    pointer-events: none;
}

/* The love letter card */
.surprise-content {
    background: linear-gradient(150deg, #fff5fa 0%, #fef9ff 40%, #fff8f2 100%);
    backdrop-filter: blur(20px);
    padding: 3rem 2.5rem 2.5rem;
    border-radius: 30px;
    max-width: 540px;
    width: 100%;
    text-align: center;
    box-shadow: 0 40px 90px rgba(0,0,0,0.5), 0 10px 40px var(--shadow-medium),
                inset 0 1px 0 rgba(255,255,255,0.9);
    border: 2px solid rgba(255,182,214,0.35);
    transform: scale(0.78) translateY(30px);
    transition: all 0.55s cubic-bezier(0.34,1.4,0.64,1);
    position: relative;
    overflow: hidden;
    z-index: 2;
    animation: none;
}

/* Rainbow top stripe */
.surprise-content::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg,
        #ff6b9d, #ff9dbb, #ffd700, #ff9dbb, #c9a8ff, #ff6b9d);
    background-size: 200% auto;
    animation: shimmer 3s linear infinite;
    border-radius: 30px 30px 0 0;
}

.surprise-modal.active .surprise-content {
    transform: scale(1) translateY(0);
}

.surprise-close {
    position: absolute;
    top: 1.2rem; right: 1.2rem;
    background: rgba(255,255,255,0.9);
    border: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 1.8rem;
    cursor: pointer;
    color: var(--pink-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px var(--shadow-soft);
    z-index: 2;
}

.surprise-close:hover {
    background: var(--pink-deep);
    color: white;
    transform: scale(1.12) rotate(90deg);
}

/* Envelope decoration */
.letter-envelope-icon {
    font-size: 4rem;
    display: block;
    margin-bottom: 0.6rem;
    animation: loveLetterDrop 0.9s cubic-bezier(0.34,1.4,0.64,1) 0.2s both;
    filter: drop-shadow(0 6px 14px rgba(255,46,122,0.35));
}

.letter-main-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 4vw, 2.2rem);
    color: var(--pink-deep);
    margin-bottom: 1.4rem;
    text-shadow: 0 2px 8px rgba(255,107,157,0.25);
    animation: revealLetter 0.7s ease 0.4s both;
}

.letter-intro {
    font-size: 1.15rem;
    line-height: 1.75;
    margin-bottom: 1.4rem;
    color: var(--text-dark);
    animation: revealLetter 0.7s ease 0.5s both;
}

.letter-block {
    border-radius: 18px;
    padding: 1.4rem 1.6rem;
    margin-bottom: 1.2rem;
    text-align: left;
    animation: revealLetter 0.7s ease 0.6s both;
}

.letter-block-pink {
    background: rgba(255,182,214,0.18);
    border-left: 4px solid var(--pink-deep);
}

.letter-block-lavender {
    background: rgba(200,168,255,0.15);
    border-left: 4px solid var(--lavender-dark);
}

.letter-block p {
    font-size: 1.1rem;
    line-height: 1.72;
    color: var(--text-dark);
    font-style: italic;
}

/* Heart row inside modal */
.letter-heart-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 1rem 0;
    flex-wrap: wrap;
}

.lhr {
    font-size: 24px;
    animation: heartbeat 1.2s ease-in-out infinite;
}
.lhr:nth-child(1) { animation-delay: 0s; }
.lhr:nth-child(2) { animation-delay: 0.15s; }
.lhr:nth-child(3) { animation-delay: 0.3s; }
.lhr:nth-child(4) { animation-delay: 0.45s; }
.lhr:nth-child(5) { animation-delay: 0.6s; }

/* Reasons grid */
.letter-reasons {
    background: linear-gradient(135deg, rgba(255,230,242,0.5), rgba(230,207,255,0.4));
    border-radius: 18px;
    padding: 1.4rem 1.6rem;
    margin-bottom: 1.2rem;
    animation: revealLetter 0.7s ease 0.7s both;
}

.letter-reasons-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: #a2358c;
    margin-bottom: 1rem;
    text-align: center;
}

.letter-reason-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 0.7rem;
    font-size: 0.95rem;
    color: #5a3568;
    line-height: 1.55;
    text-align: left;
}

.letter-reason-item .ico { font-size: 16px; flex-shrink: 0; margin-top: 2px; }

.letter-sign-off {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--pink-deep);
    margin-top: 0.8rem;
    animation: revealLetter 0.7s ease 0.8s both;
}

.letter-never-give-up {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: #8b3aaa;
    background: white;
    border-radius: 50px;
    padding: 10px 24px;
    margin-top: 1rem;
    display: inline-block;
    box-shadow: 0 4px 18px rgba(180,80,200,0.2);
    animation: revealLetter 0.7s ease 0.9s both, pulse-glow 2s ease-in-out infinite 1s;
}

/* =====================
   FOOTER
   ===================== */

.footer {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dark);
    position: relative;
    margin-top: 3rem;
}

.footer::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink-deep), transparent);
}

.footer-hearts {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.footer-heart {
    animation: float 3s ease-in-out infinite;
    opacity: 0.8;
    filter: drop-shadow(0 4px 8px var(--shadow-soft));
    cursor: pointer;
    transition: all 0.3s ease;
}
.footer-heart:hover { transform: scale(1.35) rotate(20deg); opacity: 1; }

.footer-text {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
    animation: gentlePulse 4s ease-in-out infinite;
}

.footer-subtext {
    font-size: 1.1rem;
    color: var(--text-light);
    margin-bottom: 1rem;
    font-style: italic;
}

.footer-year {
    font-size: 0.9rem;
    color: var(--text-light);
    opacity: 0.8;
}

/* =====================
   RESPONSIVE
   ===================== */

@media (max-width: 768px) {
    .hero-title  { font-size: clamp(2rem, 8vw, 2.5rem); padding: 0 0.5rem; }
    .floating-heart { font-size: 1.8rem; }
    .photo-carousel { width: clamp(220px,65vw,280px); height: clamp(220px,65vw,280px); margin: 1.5rem auto; }
    .photo-container { border-width: 8px; }

    .gallery-3d-disc { width: 300px; height: 300px; }
    .gallery-3d-item { width: 140px; height: 140px; transform: translate(-50%,-50%) rotateY(var(--angle)) translateZ(500px); }
    .gallery-item { border-width: 3px; border-radius: 15px; }
    .gallery-caption { font-size: 0.6rem; }
    .section { padding: 3rem 1rem; }
    .section-title { font-size: 1.8rem; margin-bottom: 2rem; }
    .dates-timeline { padding: 2rem 0; }
    .timeline-line { left: 30px; width: 3px; }
    .timeline-item { flex-direction: row !important; padding-left: 4rem; margin: 2.5rem 0; }
    .timeline-content { width: 100%; padding: 1.8rem; }
    .timeline-dot { left: 30px; width: 22px; height: 22px; border-width: 4px; }
    .timeline-date { font-size: 1.1rem; }
    .timeline-type { font-size: 1.3rem; }
    .timeline-title { font-size: 1rem; padding-left: 0.8rem; }
    .note-card { padding: 1.2rem; }
    .typewriter-text { font-size: 1.2rem; }
    .controls { top: 0.8rem; right: 0.8rem; gap: 0.6rem; }
    .control-btn { width: 42px; height: 42px; font-size: 1.3rem; }
    .surprise-button { padding: 1.2rem 2rem; font-size: 1.4rem; flex-direction: column; gap: 0.5rem; }
    .surprise-button-heart { font-size: 1.8rem; }
    .quotes-container { grid-template-columns: 1fr; gap: 1.5rem; padding: 0 1rem; }
    .quote-card { padding: 2rem 1.5rem; }
    .quote-text { font-size: 1.2rem; }
    .footer { padding: 3rem 1rem; }
    .surprise-content { padding: 2.5rem 1.5rem 2rem; }
    .letter-main-title { font-size: 1.5rem; }
    .letter-block p, .letter-intro, .letter-reason-item { font-size: 1rem; }
}

@media (max-width: 480px) {
    .hero-title  { font-size: 1.8rem; }
    .photo-carousel { width: 200px; height: 200px; }
    .timeline-item { padding-left: 3rem; margin: 2rem 0; }
    .timeline-line { left: 25px; }
    .timeline-dot  { left: 25px; }
    .timeline-content { padding: 1.5rem; }
    .floating-heart { font-size: 1.5rem; }
    .section-title { font-size: 1.6rem; }
    .surprise-button { font-size: 1.2rem; padding: 1rem 1.5rem; }
    .quotes-container { padding: 0 0.5rem; }
    .quote-card { padding: 1.5rem 1rem; }
    .quote-icon { font-size: 2rem; }
    .quote-text { font-size: 1.1rem; }
    .footer { padding: 2rem 1rem; }
    .footer-heart { font-size: 1.3rem; }
}

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script id="app-source" type="text/jsx-source">
const { useState, useEffect, useRef } = React;

/* ─────────────────────────────────────────
   AURORA + PETAL BACKGROUND
   ───────────────────────────────────────── */
const AuroraBackground = () => {
    const auroraRef = useRef(null);
    const petalRef  = useRef(null);

    useEffect(() => {
        /* ── Aurora canvas ── */
        const ac  = auroraRef.current;
        const actx = ac.getContext('2d');
        let aw, ah, aAnimId;

        const resizeAurora = () => {
            aw = ac.width  = window.innerWidth;
            ah = ac.height = window.innerHeight;
        };
        resizeAurora();
        window.addEventListener('resize', resizeAurora);

        const isNight = () => document.documentElement.getAttribute('data-theme') === 'night';

        let t = 0;
        const drawAurora = () => {
            t += 0.003;
            actx.clearRect(0, 0, aw, ah);

            const blobs = isNight()
                ? [
                    { x: 0.15, y: 0.2,  r: 0.45, c1: 'rgba(80,30,90,0.45)',   c2: 'transparent' },
                    { x: 0.75, y: 0.15, r: 0.4,  c1: 'rgba(45,27,74,0.4)',    c2: 'transparent' },
                    { x: 0.5,  y: 0.65, r: 0.5,  c1: 'rgba(26,15,26,0.5)',    c2: 'transparent' },
                    { x: 0.85, y: 0.7,  r: 0.35, c1: 'rgba(30,19,53,0.38)',   c2: 'transparent' },
                  ]
                : [
                    { x: 0.18, y: 0.22, r: 0.48, c1: 'rgba(255,182,214,0.45)', c2: 'transparent' },
                    { x: 0.78, y: 0.18, r: 0.42, c1: 'rgba(200,160,255,0.38)', c2: 'transparent' },
                    { x: 0.5,  y: 0.7,  r: 0.5,  c1: 'rgba(255,230,242,0.5)',  c2: 'transparent' },
                    { x: 0.1,  y: 0.72, r: 0.38, c1: 'rgba(230,207,255,0.35)', c2: 'transparent' },
                    { x: 0.88, y: 0.65, r: 0.36, c1: 'rgba(255,200,220,0.3)',  c2: 'transparent' },
                  ];

            blobs.forEach((b, i) => {
                const bx = (b.x + Math.sin(t + i * 1.3) * 0.07) * aw;
                const by = (b.y + Math.cos(t + i * 1.1) * 0.06) * ah;
                const br = b.r * Math.max(aw, ah);
                const g  = actx.createRadialGradient(bx, by, 0, bx, by, br);
                g.addColorStop(0, b.c1);
                g.addColorStop(1, b.c2);
                actx.beginPath();
                actx.arc(bx, by, br, 0, Math.PI * 2);
                actx.fillStyle = g;
                actx.fill();
            });

            aAnimId = requestAnimationFrame(drawAurora);
        };
        drawAurora();

        /* ── Petal/heart particle canvas ── */
        const pc   = petalRef.current;
        const pctx = pc.getContext('2d');
        let pw, ph, pAnimId;

        const resizePetal = () => {
            pw = pc.width  = window.innerWidth;
            ph = pc.height = window.innerHeight;
        };
        resizePetal();
        window.addEventListener('resize', resizePetal);

        const PETALS  = 22;
        const EMOJIS  = ['💕','💖','💗','💓','💝','🌸','✨','💫','🌺'];
        const NIGHT_E = ['💜','✨','🌙','💫','⭐','🌟'];

        const particles = Array.from({ length: PETALS }, (_, i) => ({
            x: Math.random() * 100,
            y: Math.random() * 100,
            speed: 0.015 + Math.random() * 0.025,
            size:  14  + Math.random() * 12,
            drift: (Math.random() - 0.5) * 0.04,
            phase: Math.random() * Math.PI * 2,
            emoji: i % 2 === 0
                ? EMOJIS[Math.floor(Math.random() * EMOJIS.length)]
                : NIGHT_E[Math.floor(Math.random() * NIGHT_E.length)],
            alpha: 0.3 + Math.random() * 0.45,
        }));

        let pt = 0;
        const drawPetals = () => {
            pt += 1;
            pctx.clearRect(0, 0, pw, ph);

            particles.forEach(p => {
                p.y -= p.speed;
                p.x += p.drift + Math.sin((pt + p.phase * 60) / 80) * 0.04;
                if (p.y < -5) { p.y = 105; p.x = Math.random() * 100; }
                if (p.x < -5) p.x = 105;
                if (p.x > 105) p.x = -5;

                pctx.save();
                pctx.globalAlpha = p.alpha * (0.7 + 0.3 * Math.sin(pt * 0.03 + p.phase));
                pctx.font = `${p.size}px serif`;
                pctx.fillText(p.emoji, (p.x / 100) * pw, (p.y / 100) * ph);
                pctx.restore();
            });

            pAnimId = requestAnimationFrame(drawPetals);
        };
        drawPetals();

        return () => {
            cancelAnimationFrame(aAnimId);
            cancelAnimationFrame(pAnimId);
            window.removeEventListener('resize', resizeAurora);
            window.removeEventListener('resize', resizePetal);
        };
    }, []);

    return (
        <>
            <canvas ref={auroraRef} id="aurora-canvas" />
            <canvas ref={petalRef}  id="petal-canvas"  />
        </>
    );
};

/* ─────────────────────────────────────────
   OPENING ANIMATION
   ───────────────────────────────────────── */
const OpeningAnimation = ({ onComplete }) => {
    const [phase, setPhase] = useState('entering');

    useEffect(() => {
        const t1 = setTimeout(() => setPhase('visible'),  500);
        const t2 = setTimeout(() => setPhase('exiting'), 2600);
        const t3 = setTimeout(() => onComplete(),         3200);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
    }, [onComplete]);

    return (
        <div className={`opening-animation ${phase}`}>
            <div className="opening-content">
                <div className="opening-heart">💕</div>
                <h1 className="opening-title">To the Love of My Life</h1>
                <div className="opening-subtitle">❤️</div>
            </div>
        </div>
    );
};

/* ─────────────────────────────────────────
   HERO
   ───────────────────────────────────────── */
const Hero = () => {
    const [currentPhoto, setCurrentPhoto]   = useState(0);
    const [isRotating,   setIsRotating]     = useState(false);
    const [isHovering,   setIsHovering]     = useState(false);

    const photos = [
        'K&V/photo6.jpeg',
        'K&V/photo2.jpeg',
        'images/photo12.jpeg',
        'images/photo1.jpeg',
        'images/photo3.jpeg',
    ];

    useEffect(() => {
        const iv = setInterval(() => {
            setIsRotating(true);
            setTimeout(() => {
                setCurrentPhoto(p => (p + 1) % photos.length);
                setIsRotating(false);
            }, 420);
        }, 4000);
        return () => clearInterval(iv);
    }, [photos.length]);

    const goTo = i => {
        if (i === currentPhoto) return;

/* ─────────────────────────────────────────
   TYPEWRITER
   ───────────────────────────────────────── */
const Typewriter = ({ text, speed = 50, onComplete }) => {
    const [displayed, setDisplayed] = useState('');
    const [done,      setDone]      = useState(false);

    useEffect(() => {
        let idx = 0;
        const iv = setInterval(() => {
            if (idx < text.length) {
                setDisplayed(text.slice(0, ++idx));
            } else {
                setDone(true);
                clearInterval(iv);
                onComplete?.();
            }
        }, speed);
        return () => clearInterval(iv);
    }, [text, speed, onComplete]);

    return (
        <span className="typewriter-text">
            {displayed}
            {!done && <span className="typewriter-cursor">|</span>}
        </span>
    );
};

/* ─────────────────────────────────────────
   MAIN APP
   ───────────────────────────────────────── */
const App = () => {
    const [theme,              setTheme]              = useState('day');
    const [musicPlaying,       setMusicPlaying]       = useState(false);
    const [showLetter,         setShowLetter]         = useState(false);
    const [showOpening,        setShowOpening]        = useState(true);
    const [hasMusicInteraction,setHasMusicInteraction]= useState(false);
    const audioRef = useRef(null);

    /* Theme */
    useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme === 'day' ? 'day' : 'night');
    }, [theme]);

    /* Audio init on first interaction */
    useEffect(() => {
        const init = () => {
            if (!audioRef.current) {
                audioRef.current = new Audio('music.mp3');
                audioRef.current.loop   = true;
                audioRef.current.volume = 0.5;
            }
            setHasMusicInteraction(true);
            document.removeEventListener('click',      init);
            document.removeEventListener('touchstart', init);
        };
        document.addEventListener('click',      init);
        document.addEventListener('touchstart', init);
        return () => {
            document.removeEventListener('click',      init);
            document.removeEventListener('touchstart', init);
        };
    }, []);

    const handleThemeToggle = () => setTheme(t => t === 'day' ? 'night' : 'day');

    const handleMusicToggle = () => {
        if (!hasMusicInteraction) {
            setHasMusicInteraction(true);
            if (!audioRef.current) {
                audioRef.current = new Audio('music.mp3');
                audioRef.current.loop   = true;
                audioRef.current.volume = 0.5;
            }
            audioRef.current.play()
                .then(() => setMusicPlaying(true))
                .catch(() => setMusicPlaying(false));
            return;
        }
        if (!audioRef.current) return;
        if (musicPlaying) {
            audioRef.current.pause();
            setMusicPlaying(false);
        } else {
            audioRef.current.play()
                .then(() => setMusicPlaying(true))
                .catch(() => {});
        }
    };

    /* Scroll reveal */
    useEffect(() => {
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.style.opacity   = '1';
                    e.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        const els = document.querySelectorAll('.section, .note-card, .timeline-item, .surprise-button-container');
        els.forEach(el => obs.observe(el));
        return () => els.forEach(el => obs.unobserve(el));
    }, []);

    return (
        <>
            {showOpening && <OpeningAnimation onComplete={() => setShowOpening(false)} />}

            {!showOpening && (
                <>
                    <AuroraBackground />

                    <Controls
                        theme={theme}
                        onThemeToggle={handleThemeToggle}
                        musicPlaying={musicPlaying}
                        onMusicToggle={handleMusicToggle}
                        hasMusicInteraction={hasMusicInteraction}
                    />

                    <Hero />
                    <Gallery />
                    <Dates />
                    <LoveNotes />
                    <RomanticQuotes />

                    <SurpriseButton onClick={() => setShowLetter(true)} />

                    <Footer />

                    <LoveLetterModal
                        isOpen={showLetter}
                        onClose={() => setShowLetter(false)}
                    />
                </>
            )}
        </>
    );
};

} else {
